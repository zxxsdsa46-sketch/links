<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nedoverchivyy — links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000;
    --white:#ffffff;
    --gray:#8a8a8a;
    --border:rgba(255,255,255,0.12);
    --border-hover:rgba(255,255,255,0.35);
  }

  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
  }

  html,body{
    height:100%;
  }

  body{
    background:var(--bg);
    color:var(--white);
    font-family:'Plus Jakarta Sans', sans-serif;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    min-height:100vh;
    width:100vw;
  }

  canvas#snow{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
  }

  .card{
    position:relative;
    z-index:2;
    width:430px;
    max-width:90vw;
    background:#000000;
    border:1px solid var(--border);
    border-radius:24px;
    padding:30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    opacity:0;
    transform:translateY(30px);
    animation:cardAppear 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    transform-style:preserve-3d;
    will-change:transform;
    transition:box-shadow 0.4s ease;
  }

  @keyframes cardAppear{
    to{
      opacity:1;
      transform:translateY(0);
    }
  }

  .card-header{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:28px;
  }

  .avatar{
    flex-shrink:0;
    width:64px;
    height:64px;
    border-radius:50%;
    background:linear-gradient(145deg, #9a9a9a, #6f6f6f);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#000000;
    font-weight:800;
    font-size:28px;
    font-family:'Plus Jakarta Sans', sans-serif;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.15);
  }

  .header-text{
    display:flex;
    flex-direction:column;
    gap:2px;
  }

  .username{
    font-size:20px;
    font-weight:700;
    color:var(--white);
    letter-spacing:0.2px;
  }

  .subtitle{
    font-size:14px;
    font-weight:500;
    color:var(--gray);
    letter-spacing:0.3px;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .link-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:var(--white);
    background:#000000;
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px 20px;
    font-size:15px;
    font-weight:600;
    letter-spacing:0.3px;
    cursor:pointer;
    transition:transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
               border-color 0.35s ease,
               box-shadow 0.35s ease,
               background 0.35s ease;
    opacity:0;
    transform:translateY(14px);
    animation:btnAppear 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .link-btn:hover{
    border-color:var(--border-hover);
    transform:scale(1.03);
    box-shadow:0 0 24px rgba(255,255,255,0.08), 0 8px 20px rgba(0,0,0,0.4);
    background:#0a0a0a;
  }

  .link-btn:active{
    transform:scale(0.99);
  }

  @keyframes btnAppear{
    to{
      opacity:1;
      transform:translateY(0);
    }
  }

  .link-btn:nth-child(1){ animation-delay:0.5s; }
  .link-btn:nth-child(2){ animation-delay:0.65s; }
  .link-btn:nth-child(3){ animation-delay:0.8s; }
  .link-btn:nth-child(4){ animation-delay:0.95s; }

  @media (max-width:480px){
    .card{
      width:92vw;
      padding:24px;
      border-radius:20px;
    }
    .avatar{
      width:56px;
      height:56px;
      font-size:24px;
    }
    .username{
      font-size:18px;
    }
    .subtitle{
      font-size:13px;
    }
    .link-btn{
      padding:14px 18px;
      font-size:14px;
    }
  }
</style>
</head>
<body>

<canvas id="snow"></canvas>
<div class="card" id="card">
  <div class="card-header">
    <div class="avatar">H</div>
    <div class="header-text">
      <div class="username">nedoverchivyy</div>
      <div class="subtitle">links</div>
    </div>
  </div>

  <div class="links">
    <a class="link-btn" href="https://tiktok.com/@t4kedd" target="_blank" rel="noopener noreferrer">TikTok</a>
    <a class="link-btn" href="https://steamcommunity.com/id/nedoverchivyy" target="_blank" rel="noopener noreferrer">Steam</a>
    <a class="link-btn" href="https://www.youtube.com/@nedoverchivyy" target="_blank" rel="noopener noreferrer">YouTube</a>
    <a class="link-btn" href="https://t.me/nedoverchivyy" target="_blank" rel="noopener noreferrer">Telegram</a>
  </div>
</div>

<script>
  // ---------- Снег ----------
  const canvas = document.getElementById('snow');
  const ctx = canvas.getContext('2d');

  let width, height, snowflakes;

  function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }

  function createSnowflakes(){
    const count = Math.floor((width * height) / 12000);
    snowflakes = [];
    for(let i = 0; i < count; i++){
      snowflakes.push({
        x: Math.random() * width,
        y: Math.random() * height,
        radius: Math.random() * 2.2 + 0.6,
        speedY: Math.random() * 0.6 + 0.3,
        speedX: Math.random() * 0.4 - 0.2,
        drift: Math.random() * Math.PI * 2,
        driftSpeed: Math.random() * 0.02 + 0.005,
        opacity: Math.random() * 0.5 + 0.3
      });
    }
  }

  function drawSnow(){
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = '#ffffff';

    for(const flake of snowflakes){
      ctx.globalAlpha = flake.opacity;
      ctx.beginPath();
      ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
      ctx.fill();

      flake.drift += flake.driftSpeed;
      flake.y += flake.speedY;
      flake.x += flake.speedX + Math.sin(flake.drift) * 0.3;

      if(flake.y > height + 5){
        flake.y = -5;
        flake.x = Math.random() * width;
      }
      if(flake.x > width + 5) flake.x = -5;
      if(flake.x < -5) flake.x = width + 5;
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(drawSnow);
  }

  window.addEventListener('resize', () => {
    resize();
    createSnowflakes();
  });

  resize();
  createSnowflakes();
  drawSnow();

  // ---------- 3D Tilt эффект карточки ----------
  const card = document.getElementById('card');
  const maxTilt = 8;

  function handleTilt(e){
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    const dx = (e.clientX - cx) / (rect.width / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);

    const rotateX = (-dy * maxTilt).toFixed(2);
    const rotateY = (dx * maxTilt).toFixed(2);

    card.style.transform = translateY(0) perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg);
  }

  function resetTilt(){
    card.style.transform = 'translateY(0) perspective(800px) rotateX(0deg) rotateY(0deg)';
  }

  window.addEventListener('mousemove', (e) => {
    // Отключаем tilt до завершения анимации появления
    if(document.body.classList.contains('ready')){
      handleTilt(e);
    }
  });

  window.addEventListener('mouseleave', resetTilt);

  setTimeout(() => {
    document.body.classList.add('ready');
  }, 950);
</script>

</body>
</html>
